<div class="max-w-2xl mx-auto   p-8 rounded-2xl shadow-xl border border-medical-cyan/30 dark:border-medical-cyan/30">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-100 ">Accessible Reader</h2>
        <p class="mt-2 text-gray-300 ">Convert complex medical text to speech</p>
    </div>

    <textarea [(ngModel)]="textToSpeak" rows="6"
        placeholder="Paste your medical text or prescription instructions here..."
        class="w-full p-4 border border-medical-cyan/30 dark:border-medical-cyan/30 rounded-xl resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 glass-panel  text-white  shadow-sm transition-shadow">
    </textarea>

    <div class="mt-6 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="flex flex-col sm:flex-row w-full gap-4">
            <!-- Language filter dropdown -->
            <select [(ngModel)]="ttsLanguage" (change)="onLanguageFilterChange()" class="w-full sm:w-auto p-3 border border-medical-cyan/30 dark:border-medical-cyan/30 rounded-lg bg-medical-blue/20 text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none shadow-sm cursor-pointer">
                <option value="all">All Languages</option>
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="mr">Marathi</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
            </select>

            <!-- Voice selector -->
            <select [(ngModel)]="selectedVoice" class="w-full p-3 border border-medical-cyan/30 dark:border-medical-cyan/30 rounded-lg bg-medical-blue/20 text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none shadow-sm cursor-pointer">
                <option *ngIf="voices.length === 0" [ngValue]="null">Default System Voice</option>
                <option *ngFor="let voice of voices" [ngValue]="voice">{{ voice.name }} ({{ voice.lang }})</option>
            </select>
        </div>
        
        <div class="flex gap-3 w-full sm:w-auto">
             <button [disabled]="isSpeaking || !textToSpeak.trim()" (click)="handleSpeak()"
                 class="flex-1 sm:flex-none px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow disabled:opacity-50 flex justify-center items-center gap-2 transition-colors">
                 <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                 <span>Speak</span>
             </button>
             <button [disabled]="!isSpeaking" (click)="handleStop()"
                 class="flex-1 sm:flex-none px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg shadow disabled:opacity-50 flex justify-center items-center gap-2 transition-colors">
                 <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
                 <span>Stop</span>
             </button>
        </div>
    </div>
    
    <div class="mt-8 pt-6 border-t border-medical-cyan/30 dark:border-medical-cyan/30">
        <div class="glass-panel p-4 rounded-lg flex items-start gap-4">
            <span class="text-blue-400 mt-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
            </span>
            <p class="text-sm text-blue-800 dark:text-blue-300">{{ translation.t('symptomChecker.disclaimerTitle') }}: This tool is an accessibility aid and does not provide interpretation of medical instructions.</p>
        </div>
    </div>
</div>

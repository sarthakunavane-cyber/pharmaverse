<div class="px-4 py-8 sm:px-0 opacity-0 animate-fade-in-up" style="animation-fill-mode: forwards;">
    <div class="text-center mb-12">
        <div class="inline-flex items-center justify-center p-3 sm:p-4 mb-4 sm:mb-6 rounded-full bg-gradient-to-tr from-teal-500 to-cyan-400 shadow-xl transform transition-transform hover:scale-110">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 sm:h-12 sm:w-12 text-white" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" />
            </svg>
        </div>
        <h2 class="text-3xl sm:text-5xl font-extrabold text-white  mb-4 tracking-tight leading-tight">
            {{ translation.t('home.title') }}
        </h2>
        <p class="text-lg sm:text-xl text-gray-300  max-w-3xl mx-auto leading-relaxed">
            {{ translation.t('home.mission') }}
        </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6 lg:gap-8 perspective-1000">
        <div *ngFor="let tool of tools; let i = index" 
             [routerLink]="'/' + tool.id"
             appGsapTilt
             appGsapReveal
             class="group glass-panel rounded-2xl cursor-pointer overflow-hidden flex flex-col h-full transform hover:-translate-y-1 transition-all hover:shadow-neon-cyan hover:border-medical-cyan/50">
            <div class="p-5 sm:p-6 flex flex-col h-full">
                <div class="flex items-center mb-4 sm:mb-5">
                    <div class="p-3 rounded-xl mr-4 {{ tool.color }} transition-colors duration-300 group-hover:bg-opacity-80">
                         <!-- Fallback icon placeholder since we skip string interolation of lucide icons for now -->
                         <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m12 16 4-4-4-4"/><path d="M8 12h8"/></svg>
                    </div>
                    <h3 class="text-lg sm:text-xl font-bold text-white  group-hover:text-teal-600 dark:group-hover:text-teal-400 transition-colors line-clamp-2">
                        {{ translation.t(tool.titleKey) }}
                    </h3>
                </div>
                <p class="text-sm sm:text-base text-gray-300  leading-relaxed flex-grow">
                    {{ translation.t(tool.descKey) }}
                </p>
                <div class="mt-4 pt-4 border-t border-medical-cyan/30 dark:border-medical-cyan/30 flex items-center text-teal-600 dark:text-teal-400 font-medium group-hover:translate-x-2 transition-transform duration-300">
                    <span>Try it now</span>
                </div>
            </div>
        </div>
    </div>
</div>
